services:
  db:
    image: postgres:16-alpine
    container_name: tvds_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tvds_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tvds_password}
      POSTGRES_DB: ${POSTGRES_DB:-tvds_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tvds_user} -d ${POSTGRES_DB:-tvds_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tvds_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tvds_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tvds_password}
      POSTGRES_DB: ${POSTGRES_DB:-tvds_db}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      YOLO_MODEL_PATH: ${YOLO_MODEL_PATH:-yolov8n.pt}
      # Optional custom plate detector (e.g. trained on Mongolian plates).
      # Drop the .pt into ./models on the host; it appears at /app/models inside.
      PLATE_MODEL_PATH: ${PLATE_MODEL_PATH:-}
      # Custom character-level OCR model. Auto-detected at
      # /app/models/mn_plate_ocr_yolo.pt; set explicitly to override.
      MODELS_DIR: ${MODELS_DIR:-/app/models}
      PLATE_OCR_MODEL_PATH: ${PLATE_OCR_MODEL_PATH:-}
      # Mongolian plates are Cyrillic: set OCR_LANGUAGES=mn,en for production.
      OCR_LANGUAGES: ${OCR_LANGUAGES:-en}
      OCR_ALLOWLIST: ${OCR_ALLOWLIST:-}
      USE_GPU: ${USE_GPU:-false}
      DEBUG: ${DEBUG:-false}
    ports:
      - "8000:8000"
    volumes:
      # Persist downloaded model weights (Ultralytics + EasyOCR) across runs.
      - model_cache:/home/appuser
      # Mount your custom .pt weights here (read-only).
      - ./models:/app/models:ro

volumes:
  postgres_data:
  model_cache:
